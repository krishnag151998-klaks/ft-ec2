name: Deploy to EC2

# This tells GitHub to run the pipeline every time you push to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to your project directory (change this to your actual folder path)
            cd /path/to/your/project/folder
            
            # Pull the latest code from GitHub
            git pull origin main
            
            # Add any other build or restart commands here!
            # Example: npm install
            # Example: sudo systemctl restart your-app
